            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-background min-h-screen pb-24">
<!-- Header Section (Hero with Gradient) -->
<header class="relative w-full h-[309px] flex flex-col items-center justify-center bg-gradient-to-br from-[#1E40AF] to-[#2563EB] text-white">
<!-- Top App Bar (Shell Component) -->
<div class="absolute top-0 left-0 w-full flex justify-between items-center px-4 h-16">
<h1 class="text-xl font-bold tracking-tight text-white">Turnify</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
<div class="flex flex-col items-center mt-8">
<!-- Avatar -->
<div class="relative">
<div class="w-24 h-24 rounded-full border-4 border-white/30 flex items-center justify-center bg-white/20 text-white font-bold text-2xl">
                    MR
                </div>
<div class="absolute bottom-0 right-0 w-8 h-8 bg-white text-primary rounded-full flex items-center justify-center shadow-lg cursor-pointer">
<span class="material-symbols-outlined text-[18px]" data-icon="edit">edit</span>
</div>
</div>
<!-- User Info -->
<div class="mt-4 text-center">
<h2 class="font-headline-md text-white text-[22px]">Mario Rossi</h2>
<p class="font-body-md text-white/70">mario@pizzeriaroma.it</p>
<div class="mt-2 inline-flex items-center px-3 py-1 rounded-full border border-white/40 font-label-sm text-white uppercase tracking-wider text-[10px]">
                    Amministratore
                </div>
</div>
</div>
</header>
<!-- Content Area: Settings Card -->
<main class="relative px-4 -mt-8 z-10">
<div class="bg-white rounded-[28px] shadow-sm border border-slate-100 overflow-hidden">
<!-- ACCOUNT Section -->
<section class="p-6 pb-2">
<h3 class="font-label-sm text-outline uppercase mb-4">ACCOUNT</h3>
<div class="space-y-1">
<button class="w-full flex items-center justify-between py-3 group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="account_circle">account_circle</span>
<span class="font-title-sm text-on-surface">Cambia foto profilo</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between py-3 group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="lock">lock</span>
<span class="font-title-sm text-on-surface">Cambia Password</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<div class="mx-6 border-b border-slate-100"></div>
<!-- GESTIONE ATTIVITÀ Section -->
<section class="p-6">
<h3 class="font-label-sm text-outline uppercase mb-4">GESTIONE ATTIVITÀ</h3>
<div class="space-y-6">
<button class="w-full flex items-start justify-between group">
<div class="flex items-start gap-4">
<div class="mt-1">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="store">store</span>
</div>
<div class="text-left">
<p class="font-title-sm text-on-surface">Le mie attività</p>
<p class="font-body-md text-outline text-[13px]">Crea e gestisci sedi</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant mt-1" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-start justify-between group">
<div class="flex items-start gap-4">
<div class="mt-1">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="schedule">schedule</span>
</div>
<div class="text-left">
<p class="font-title-sm text-on-surface">Orari di Apertura</p>
<p class="font-body-md text-outline text-[13px]">Configura apertura/chiusura</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant mt-1" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-start justify-between group">
<div class="flex items-start gap-4">
<div class="mt-1">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="badge">badge</span>
</div>
<div class="text-left">
<p class="font-title-sm text-on-surface">Gestisci Team</p>
<p class="font-body-md text-outline text-[13px]">Aggiungi o modifica dipendenti</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant mt-1" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<div class="mx-6 border-b border-slate-100"></div>

<section class="p-6">
<h3 class="font-label-sm text-outline uppercase mb-4">PRIVACY</h3>
<div class="space-y-1">
<button class="w-full flex items-center justify-between py-3 group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="gavel">gavel</span>
<span class="font-title-sm text-on-surface">Privacy e Consenso</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between py-3 group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="download">download</span>
<span class="font-title-sm text-on-surface">Esporta i miei dati</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>

<div class="p-6 bg-slate-50/50">
<button class="w-full flex items-center justify-center gap-2 border-2 border-error text-error font-title-sm py-4 rounded-xl hover:bg-error/5 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
                    Esci dall'account
                </button>
<p class="text-center mt-6 font-label-sm text-outline-variant pb-2">
                    Turnify v1.0.0
                </p>
</div>
</div>

<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="text-[11px] font-medium font-['Inter']">Turni</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 transition-opacity active:opacity-80" href="#">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
<span class="text-[11px] font-medium font-['Inter']">Staff</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 transition-opacity active:opacity-80" href="#">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
<span class="text-[11px] font-medium font-['Inter']">Chat</span>
