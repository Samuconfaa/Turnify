<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Turnify - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed-variant": "#005137",
                    "on-secondary-container": "#006f67",
                    "on-tertiary-fixed": "#410004",
                    "surface-tint": "#006c4a",
                    "outline": "#6d7a72",
                    "surface-dim": "#d5dcd6",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#f5fff7",
                    "on-tertiary": "#ffffff",
                    "inverse-primary": "#68dba9",
                    "on-secondary-fixed-variant": "#00504a",
                    "primary-fixed-dim": "#68dba9",
                    "surface": "#f5fbf5",
                    "surface-container-high": "#e4eae4",
                    "on-secondary-fixed": "#00201d",
                    "inverse-surface": "#2c322e",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "tertiary": "#9b3e3b",
                    "surface-container-highest": "#dee4de",
                    "background": "#f5fbf5",
                    "on-tertiary-fixed-variant": "#7f2928",
                    "on-primary-fixed": "#002114",
                    "outline-variant": "#bccac0",
                    "secondary-fixed": "#9cf2e8",
                    "secondary-container": "#99efe5",
                    "on-error": "#ffffff",
                    "primary-fixed": "#85f8c4",
                    "on-background": "#171d19",
                    "primary": "#006948",
                    "surface-container": "#e9efe9",
                    "tertiary-container": "#ba5551",
                    "on-tertiary-container": "#fffbff",
                    "tertiary-fixed-dim": "#ffb3ae",
                    "surface-variant": "#dee4de",
                    "error": "#ba1a1a",
                    "on-surface": "#171d19",
                    "secondary-fixed-dim": "#80d5cb",
                    "surface-container-low": "#eff5ef",
                    "tertiary-fixed": "#ffdad7",
                    "on-surface-variant": "#3d4a42",
                    "secondary": "#006a63",
                    "primary-container": "#00855d",
                    "surface-bright": "#f5fbf5",
                    "error-container": "#ffdad6",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#ecf2ec"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "stack-lg": "32px",
                    "stack-sm": "8px",
                    "unit": "4px",
                    "stack-md": "16px",
                    "container-padding": "24px"
            },
            "fontFamily": {
                    "heading-xl": [
                            "Plus Jakarta Sans"
                    ],
                    "label-sm": [
                            "Plus Jakarta Sans"
                    ],
                    "heading-lg": [
                            "Plus Jakarta Sans"
                    ],
                    "body": [
                            "Plus Jakarta Sans"
                    ],
                    "button": [
                            "Plus Jakarta Sans"
                    ]
            },
            "fontSize": {
                    "heading-xl": [
                            "26px",
                            {
                                    "lineHeight": "1.2",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "800"
                            }
                    ],
                    "label-sm": [
                            "12px",
                            {
                                    "lineHeight": "1",
                                    "letterSpacing": "0.05em",
                                    "fontWeight": "600"

                    "heading-lg": [

                    "button": [

                                    "lineHeight": "1",

<style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest min-h-screen flex flex-col font-body text-body text-on-surface">
<!-- Hero Section -->
<div class="h-[220px] bg-gradient-to-b from-on-primary-fixed-variant to-primary flex flex-col items-center justify-center pb-8 shrink-0 relative overflow-hidden">
<!-- Abstract background elements to add lushness -->
<div class="absolute inset-0 bg-primary-fixed opacity-10 mix-blend-overlay"></div>
<div class="absolute -top-12 -left-12 w-40 h-40 bg-white/5 rounded-full blur-2xl"></div>
<div class="absolute top-1/2 -right-8 w-32 h-32 bg-primary-fixed-dim/20 rounded-full blur-xl"></div>
<div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center backdrop-blur-md mb-4 shadow-lg shadow-on-primary-fixed-variant/50 border border-white/10 relative z-10">
<span class="text-on-primary font-heading-xl text-heading-xl">T</span>
</div>
<h1 class="text-on-primary font-heading-xl text-heading-xl tracking-tight relative z-10">Turnify</h1>
</div>
<!-- Bottom Sheet -->
<div class="flex-1 bg-surface-container-lowest rounded-t-[28px] -mt-[28px] relative z-20 px-container-padding pt-stack-lg pb-stack-lg flex flex-col shadow-[0_-8px_30px_rgba(0,33,20,0.1)]">
<!-- Drag Handle Indicator (Visual cue for sheet) -->
<div class="w-12 h-1.5 bg-surface-variant rounded-full mx-auto mb-stack-sm absolute top-3 left-1/2 -translate-x-1/2"></div>
<h2 class="font-heading-lg text-heading-lg text-on-surface mb-stack-lg text-center">Accedi</h2>
<!-- Role Toggle -->
<div class="flex p-1 bg-surface-container rounded-full mb-stack-lg shadow-inner">
<button class="flex-1 py-3 rounded-full bg-surface-container-lowest text-primary font-label-sm text-label-sm shadow-sm border border-outline-variant/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px]">admin_panel_settings</span>
                Admin
            </button>
<button class="flex-1 py-3 rounded-full text-on-surface-variant font-label-sm text-label-sm transition-all hover:text-on-surface flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px]">badge</span>
                Employee
            </button>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-stack-md flex-1">
<!-- Email Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant">mail</span>
</div>
<input class="w-full h-[52px] pl-11 pr-4 rounded-xl bg-surface-container-low border border-outline-variant/60 text-on-surface font-body text-body focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all placeholder:text-outline shadow-sm" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant">lock</span>
</div>
<input class="w-full h-[52px] pl-11 pr-12 rounded-xl bg-surface-container-low border border-outline-variant/60 text-on-surface font-body text-body focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all placeholder:text-outline shadow-sm" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<div class="flex justify-end mt-2">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Spacer to push button to bottom if screen is tall -->
<div class="flex-1 min-h-[32px]"></div>
<!-- Submit Button -->
<button class="w-full h-[52px] bg-primary text-on-primary font-button text-button rounded-xl shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-auto" type="button">
                Accedi
                <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
<div class="text-center mt-4">
<p class="font-body text-body text-on-surface-variant text-[13px]">
                    Non hai un account? <a class="text-primary font-label-sm text-label-sm" href="#">Contattaci</a>
</p>
</div>
</form>
</div>
</body></html>
