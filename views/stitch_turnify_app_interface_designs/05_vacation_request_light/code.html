<!DOCTYPE html>

<html lang="it"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Richiesta Ferie - Turnify</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",

                        "on-background": "#1d1b20",
                        "primary-fixed": "#e9ddff",

                        "margin": "16px"

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col font-body-md">
<!-- TopAppBar Component (from JSON) -->
<header class="fixed top-0 w-full z-50 bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 shadow-none">
<div class="flex justify-between items-center h-16 px-4 w-full">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors active:opacity-70 transition-opacity text-indigo-600 dark:text-indigo-400">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold text-lg tracking-tight text-on-surface">Richiesta Ferie</h1>
<div class="w-10"></div> <!-- Empty div for flex balance since we don't need trailing account here, but keep structure -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-16 px-4 pb-24 max-w-md mx-auto w-full flex flex-col gap-6 pt-6">
<!-- Tipo richiesta Section -->
<section class="flex flex-col gap-3">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Tipo richiesta</h2>
<div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
<button class="flex-shrink-0 flex items-center gap-2 bg-primary text-on-primary px-4 py-2.5 rounded-full shadow-sm active:scale-95 transition-transform">
<span>🏖️</span>
<span class="font-body-sm text-body-sm font-medium">Ferie</span>
</button>
<button class="flex-shrink-0 flex items-center gap-2 bg-surface-container text-on-surface-variant px-4 py-2.5 rounded-full hover:bg-surface-variant transition-colors active:scale-95 transition-transform border border-outline-variant/30">
<span>🤒</span>
<span class="font-body-sm text-body-sm font-medium">Permesso</span>
</button>
<button class="flex-shrink-0 flex items-center gap-2 bg-surface-container text-on-surface-variant px-4 py-2.5 rounded-full hover:bg-surface-variant transition-colors active:scale-95 transition-transform border border-outline-variant/30">
<span>📋</span>
<span class="font-body-sm text-body-sm font-medium">Altro</span>
</button>
</div>
</section>
<!-- Date Fields Section -->
<section class="flex flex-col gap-4">
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface-variant">Data inizio</label>
<div class="relative flex items-center">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary appearance-none pr-10" readonly="" type="text" value="01/07/2024"/>
<span class="material-symbols-outlined absolute right-3 text-on-surface-variant pointer-events-none" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface-variant">Data fine</label>
<div class="relative flex items-center">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary appearance-none pr-10" readonly="" type="text" value="14/07/2024"/>
<span class="material-symbols-outlined absolute right-3 text-on-surface-variant pointer-events-none" data-icon="calendar_today">calendar_today</span>
</div>
</div>
</section>
<!-- Automatic Summary Card -->
<section>
<div class="bg-primary-container/20 border border-primary-container rounded-xl p-4 flex items-center gap-3">
<div class="flex-shrink-0 w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-sm" data-icon="info">info</span>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant">Totale richiesto</span>
<span class="font-h3 text-h3 text-primary">10 giorni lavorativi</span>
</div>
</div>
</section>
<!-- Motivazione Section -->
<section class="flex flex-col gap-1.5 flex-1">
<label class="font-label-sm text-label-sm text-on-surface-variant">Motivazione</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary resize-none h-[100px]" placeholder="Aggiungi una nota..."></textarea>
</section>
<!-- Submit Button (Sticky to bottom above nav if present, or just bottom of content) -->
<div class="mt-auto pt-4">
<button class="w-full h-[52px] bg-primary text-on-primary font-label-md text-label-md rounded-[12px] flex items-center justify-center shadow-sm active:scale-95 transition-transform uppercase tracking-wide">
                Invia Richiesta
            </button>
</div>
</main>
<!-- Suppressed BottomNavBar: The prompt indicates this is a "Form Richiesta Ferie" and has a back arrow, implying a transactional/sub-page flow. The Semantic Shell Mandate says "Task-Focused: Any sub-page featuring a 'Close' or 'Back' action that implies a temporary departure from the main navigation flow MUST exclude the navigation shell." Therefore, the Bottom Nav is deliberately omitted here to prioritize the Canvas. -->
</body></html>
