<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile Page</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#005137",
                        "on-secondary-container": "#006f67",
                        "on-tertiary-fixed": "#410004",
                        "surface-tint": "#006c4a",
                        "outline": "#6d7a72",
                        "surface-dim": "#d5dcd6",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#f5fff7",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#68dba9",
                        "on-secondary-fixed-variant": "#00504a",
                        "primary-fixed-dim": "#68dba9",
                        "surface": "#f5fbf5",
                        "surface-container-high": "#e4eae4",
                        "on-secondary-fixed": "#00201d",
                        "inverse-surface": "#2c322e",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "tertiary": "#9b3e3b",
                        "surface-container-highest": "#dee4de",
                        "background": "#f5fbf5",
                        "on-tertiary-fixed-variant": "#7f2928",
                        "on-primary-fixed": "#002114",
                        "outline-variant": "#bccac0",
                        "secondary-fixed": "#9cf2e8",
                        "secondary-container": "#99efe5",
                        "on-error": "#ffffff",
                        "primary-fixed": "#85f8c4",
                        "on-background": "#171d19",
                        "primary": "#006948",
                        "surface-container": "#e9efe9",
                        "tertiary-container": "#ba5551",
                        "on-tertiary-container": "#fffbff",
                        "tertiary-fixed-dim": "#ffb3ae",
                        "surface-variant": "#dee4de",
                        "error": "#ba1a1a",
                        "on-surface": "#171d19",
                        "secondary-fixed-dim": "#80d5cb",
                        "surface-container-low": "#eff5ef",
                        "tertiary-fixed": "#ffdad7",
                        "on-surface-variant": "#3d4a42",
                        "secondary": "#006a63",
                        "primary-container": "#00855d",
                        "surface-bright": "#f5fbf5",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#ecf2ec"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "stack-lg": "32px",
                        "stack-sm": "8px",
                        "unit": "4px",
                        "stack-md": "16px",
                        "container-padding": "24px"
                    },
                    "fontFamily": {
                        "heading-xl": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "heading-lg": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "button": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "heading-xl": ["26px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "heading-lg": ["22px", {"lineHeight": "1.3", "fontWeight": "700"}],
                        "body": ["15px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "button": ["14px", {"lineHeight": "1", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body text-body pb-24">
<!-- TopAppBar -->
<header class="bg-gradient-to-r from-emerald-900 to-teal-800 dark:from-emerald-950 dark:to-teal-900 font-['Plus_Jakarta_Sans'] font-semibold docked full-width top-0 rounded-b-[20px] none shadow-lg shadow-emerald-900/20 flex justify-between items-center w-full px-6 py-4 fixed z-40">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden flex items-center justify-center border-2 border-white/20" data-alt="A small circular user profile photo showing a smiling professional in a brightly lit modern office setting.">
<span class="material-symbols-outlined text-outline text-sm">person</span>
</div>
<span class="text-2xl font-bold text-white tracking-tight">Turnify</span>
</div>
<button class="text-emerald-500 dark:text-emerald-400 hover:bg-white/10 transition-colors rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 w-full max-w-md mx-auto relative pt-[72px]">
<!-- Hero Header with overlapping Avatar -->
<div class="relative">
<div class="h-[200px] bg-gradient-to-br from-primary-container to-secondary w-full rounded-b-xl shadow-sm shadow-primary/10"></div>
<div class="absolute -bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center">
<div class="w-[80px] h-[80px] rounded-full bg-surface-container-lowest shadow-md flex items-center justify-center border-[4px] border-surface-container-lowest text-primary font-heading-lg text-heading-lg z-10">
                    JD
                </div>
</div>
</div>
<!-- Profile Info -->
<div class="mt-14 px-container-padding flex flex-col items-center text-center">
<h1 class="font-heading-xl text-heading-xl text-on-surface mb-2">Jane Doe</h1>
<div class="bg-surface-variant text-on-surface-variant px-4 py-1.5 rounded-full font-label-sm text-label-sm inline-flex items-center">
                General Manager
            </div>
</div>
<!-- Settings Sections -->
<div class="mt-stack-lg px-container-padding space-y-[10px]">
<!-- Password Card -->
<button class="w-full bg-surface-container-lowest rounded-xl p-4 flex items-center gap-4 shadow-sm shadow-primary/5 active:scale-95 transition-transform">
<div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<div class="flex-1 text-left">
<span class="font-body text-body font-semibold text-on-surface">Password &amp; Security</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<!-- Reports Card -->
<button class="w-full bg-surface-container-lowest rounded-xl p-4 flex items-center gap-4 shadow-sm shadow-primary/5 active:scale-95 transition-transform">
<div class="w-10 h-10 rounded-full bg-tertiary/10 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bar_chart</span>
</div>
<div class="flex-1 text-left">
<span class="font-body text-body font-semibold text-on-surface">Performance Reports</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<!-- Companies Card -->
<button class="w-full bg-surface-container-lowest rounded-xl p-4 flex items-center gap-4 shadow-sm shadow-primary/5 active:scale-95 transition-transform">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">domain</span>
</div>
<div class="flex-1 text-left">
<span class="font-body text-body font-semibold text-on-surface">Managed Companies</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<!-- Logout Card -->
<button class="w-full bg-surface-container-lowest rounded-xl p-4 flex items-center gap-4 shadow-sm shadow-primary/5 active:scale-95 transition-transform mt-stack-md">
<div class="w-10 h-10 rounded-full bg-error/10 flex items-center justify-center text-error">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">logout</span>
</div>
<div class="flex-1 text-left">
<span class="font-body text-body font-semibold text-error">Log Out</span>
</div>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-white dark:bg-slate-900 font-['Plus_Jakarta_Sans'] text-[12px] font-medium fixed bottom-0 w-full rounded-t-[20px] border-t border-emerald-50 dark:border-emerald-900/30 border-t border-emerald-100 dark:border-emerald-800 shadow-[0_-4px_20px_rgba(5,150,105,0.08)] fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/90 backdrop-blur-md md:hidden">
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-emerald-500 transition-all">
<span class="material-symbols-outlined mb-1">work</span>
<span>Shifts</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-emerald-500 transition-all">
<span class="material-symbols-outlined mb-1">group</span>
<span>Staff</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-emerald-500 transition-all">
<span class="material-symbols-outlined mb-1">calendar_today</span>
<span>Schedule</span>
</button>
<button class="flex flex-col items-center justify-center text-emerald-600 dark:text-emerald-400 font-bold hover:text-emerald-500 transition-all Active: scale-90 duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">person</span>
<span>Profile</span>
</button>
</nav>
</body></html>
