<!DOCTYPE html>

<html lang="it"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Turnify - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#e7c365",
                        "secondary": "#63597c",
                        "on-primary-fixed-variant": "#4f378a",
                        "on-tertiary-fixed": "#241a00",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#1f1635",
                        "on-primary-fixed": "#22005d",
                        "primary-fixed-dim": "#cfbcff",
                        "on-tertiary-fixed-variant": "#594400",
                        "on-error": "#ffffff",
                        "background": "#fdf7ff",
                        "surface-container": "#f2ecf4",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#e0d2ff",
                        "on-background": "#1d1b20",
                        "primary-fixed": "#e9ddff",
                        "tertiary-container": "#c9a74d",
                        "outline-variant": "#cbc4d2",
                        "surface-dim": "#ded8e0",
                        "secondary-fixed": "#e9ddff",
                        "on-secondary-container": "#645a7d",
                        "secondary-container": "#e1d4fd",
                        "surface-tint": "#6750a4",
                        "inverse-surface": "#322f35",
                        "primary": "#4f378a",
                        "tertiary-fixed": "#ffdf93",
                        "outline": "#7a7582",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e6e0e9",
                        "on-surface": "#1d1b20",
                        "surface-bright": "#fdf7ff",
                        "surface-container-low": "#f8f2fa",
                        "inverse-primary": "#cfbcff",
                        "on-secondary-fixed-variant": "#4b4263",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e6e0e9",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#cdc0e9",
                        "tertiary": "#765b00",
                        "on-surface-variant": "#494551",
                        "on-tertiary-container": "#503d00",
                        "inverse-on-surface": "#f5eff7",
                        "primary-container": "#6750a4",
                        "surface-container-high": "#ece6ee",
                        "surface": "#fdf7ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "base": "4px",
                        "gutter": "16px",
                        "md": "16px",
                        "sm": "8px",
                        "xl": "32px",
                        "lg": "24px",
                        "margin": "16px"
                    },
                    "fontFamily": {
                        "h1": ["Inter"],
                        "h2": ["Inter"],
                        "label-sm": ["Inter"],
                        "h3": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "h1": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "h2": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "h3": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],

                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-gutter selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-[400px] flex flex-col items-center">
<header class="text-center w-full mb-lg flex flex-col items-center pt-[44px]">
<div class="h-xl w-xl bg-primary-container rounded-xl flex items-center justify-center mb-sm shadow-sm border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">
                    calendar_month
                </span>
</div>
<h1 class="font-h1 text-h1 text-primary tracking-tighter mb-xs">Turnify</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Gestisci il tuo team</p>
</header>
<form class="w-full flex flex-col gap-sm bg-surface-container-lowest p-gutter rounded-xl border border-outline-variant/50 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)]">
<div class="relative flex items-center w-full">
<span class="material-symbols-outlined absolute left-md text-outline pointer-events-none">
                    mail
                </span>
<input class="w-full h-[52px] bg-surface-container border border-outline-variant/50 rounded-lg pl-[48px] pr-md font-body-md text-body-md text-on-background placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Email" required="" type="email"/>
</div>
<div class="relative flex items-center w-full">
<span class="material-symbols-outlined absolute left-md text-outline pointer-events-none">
                    lock
                </span>
<input class="w-full h-[52px] bg-surface-container border border-outline-variant/50 rounded-lg pl-[48px] pr-[48px] font-body-md text-body-md text-on-background placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Password" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-md flex items-center justify-center text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined">
                        visibility
                    </span>
</button>
</div>
<button class="w-full text-center mt-xs" type="button">
<span class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors">
                    Password dimenticata?
                </span>
</button>
<button class="w-full h-[52px] mt-sm bg-primary text-on-primary font-label-md text-label-md rounded-lg flex items-center justify-center shadow-sm hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                Accedi
            </button>
</form>
<footer class="mt-xl text-center w-full">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Non hai un account? 
                <a class="font-label-md text-label-md text-primary hover:underline ml-xs" href="#">
                    Registra la tua azienda
                </a>
</p>
</footer>
</main>
</body></html>
