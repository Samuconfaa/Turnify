<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Turnify - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>

                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#e7c365",
                        "secondary": "#63597c",
                        "on-primary-fixed-variant": "#4f378a",
                        "on-tertiary-fixed": "#241a00",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#1f1635",
                        "on-primary-fixed": "#22005d",
                        "primary-fixed-dim": "#cfbcff",
                        "on-tertiary-fixed-variant": "#594400",
                        "on-error": "#ffffff",
                        "background": "#111827",
                        "surface-container": "#1F2937",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#e0d2ff",
                        "on-background": "#F9FAFB",
                        "primary-fixed": "#e9ddff",
                        "tertiary-container": "#c9a74d",
                        "outline-variant": "#374151",
                        "surface-dim": "#ded8e0",
                        "secondary-fixed": "#e9ddff",
                        "on-secondary-container": "#645a7d",
                        "secondary-container": "#e1d4fd",
                        "surface-tint": "#2563EB",
                        "inverse-surface": "#322f35",
                        "primary": "#2563EB",

                        "surface-container-highest": "#e6e0e9",
                        "error": "#DC2626",
                        "secondary-fixed-dim": "#cdc0e9",
                        "tertiary": "#765b00",
                        "on-surface-variant": "#9CA3AF",
                        "on-tertiary-container": "#503d00",
                        "inverse-on-surface": "#f5eff7",
                        "primary-container": "#2563EB",
                        "surface-container-high": "#ece6ee",
                        "surface": "#111827"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "base": "4px",
                        "gutter": "16px",
                        "md": "16px",
                        "sm": "8px",
                        "xl": "32px",
                        "lg": "24px",
                        "margin": "16px"
                    },
                    "fontFamily": {

                    "fontSize": {

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased dark">
<!-- Main Container -->
<main class="flex-grow flex flex-col justify-center px-margin md:px-lg max-w-md mx-auto w-full pt-[132px] pb-xl">
<!-- Header Section -->
<header class="text-center mb-xl">
<h1 class="font-h1 text-h1 text-primary mb-sm font-black tracking-tighter">Turnify</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Gestisci il tuo team</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-md bg-surface-container p-lg rounded-xl shadow-sm border border-outline-variant">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="mail">mail</span>
<input class="w-full bg-surface-variant border border-outline text-on-surface rounded-lg py-sm pl-xl pr-sm font-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="nome@azienda.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs mb-sm">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="lock">lock</span>
<input class="w-full bg-surface-variant border border-outline text-on-surface rounded-lg py-sm pl-xl pr-sm font-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow placeholder:text-on-surface-variant/50" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-sm rounded-lg hover:bg-primary/90 transition-colors active:scale-[0.98] flex items-center justify-center gap-sm" type="submit">
<span>Accedi</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Forgot Password Link -->
<div class="text-center mt-sm">
<a class="font-body-sm text-body-sm text-primary hover:underline" href="#">Password dimenticata?</a>
</div>
</form>
<!-- Footer -->
<footer class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Non hai un account? <a class="text-primary font-label-md hover:underline" href="#">Registra la tua azienda</a>
</p>
</footer>
</main>
</body></html>
