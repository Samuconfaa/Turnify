</div>

</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-emerald-100/50 dark:hover:bg-emerald-900/30 transition-colors text-emerald-600 dark:text-emerald-400">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Simulated Main Content Area -->
<main class="p-container-padding pb-32 h-full overflow-y-auto">
<div class="flex items-center justify-between mb-stack-lg">
<h2 class="font-heading-xl text-heading-xl text-on-surface">My Vacations</h2>
<button class="bg-primary text-on-primary font-button text-button h-[52px] px-6 rounded-xl shadow-[0_4px_14px_0_rgba(5,150,105,0.39)] flex items-center gap-2">

             </button>
</div>

<div class="flex flex-col gap-stack-md opacity-30 pointer-events-none">
<!-- Item 1 -->
<div class="bg-surface-container-lowest p-gutter rounded-[20px] shadow-sm shadow-primary/5 border border-[#D1FAE5] flex justify-between items-center">
<div>
<h3 class="font-button text-button text-on-surface mb-unit">Summer Break</h3>
<p class="font-body text-body text-outline text-sm">Aug 14 - Aug 25, 2024</p>
</div>
<div class="bg-secondary-container/20 text-on-secondary-container px-3 py-1 rounded-full text-xs font-semibold">

                </div>
</div>

<div>
<h3 class="font-button text-button text-on-surface mb-unit">Dental Appointment</h3>

</div>
<div class="bg-surface-variant/30 text-outline px-3 py-1 rounded-full text-xs font-semibold">

                </div>
</div>
</div>

</div>
</div>
