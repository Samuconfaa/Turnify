        }
        body { font-family: 'Inter', sans-serif; }

        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-[#0F172A] text-on-background min-h-screen flex flex-col">
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-slate-900/50 backdrop-blur-xl border-b border-slate-800">

<h1 class="font-sans font-semibold text-lg tracking-tight text-white">Team</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-400" data-icon="search">search</span>
<span class="material-symbols-outlined text-slate-400" data-icon="notifications">notifications</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-margin-mobile mt-16 mb-16">
<div class="w-full max-w-sm flex flex-col items-center text-center">
<div class="relative mb-8">
<div class="w-32 h-32 rounded-full bg-slate-800/50 flex items-center justify-center border border-slate-700/50 relative">
<div class="absolute inset-0 bg-blue-600/5 rounded-full blur-2xl"></div>
<svg class="relative z-10 text-slate-400" fill="none" height="80" viewbox="0 0 24 24" width="80" xmlns="http://www.w3.org/2000/svg">

<circle cx="18" cy="18" fill="#0F172A" r="4" stroke="#2563EB" stroke-width="1.5"></circle>
<path d="M18 16V20M16 18H20" stroke="#2563EB" stroke-linecap="round" stroke-width="1.5"></path>
</svg>
</div>
</div>
<h2 class="font-headline-md text-headline-md text-white mb-2">Nessun dipendente ancora</h2>
<p class="font-body-md text-body-md text-slate-400 mb-8 max-w-[240px]">
                Aggiungi il tuo primo dipendente per iniziare a gestire i turni e le presenze del tuo team.
            </p>
<button class="bg-primary-container text-white px-8 py-3 rounded-xl font-title-sm text-title-sm shadow-lg shadow-blue-900/20 active:scale-95 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-icon="person_add">person_add</span>
                Aggiungi dipendente
            </button>
<div class="mt-12 grid grid-cols-2 gap-4 w-full opacity-30 pointer-events-none">
<div class="h-24 bg-slate-800 rounded-xl border border-slate-700 flex flex-col p-3 items-start gap-2">
<div class="w-8 h-8 rounded-full bg-slate-700"></div>
<div class="w-16 h-2 bg-slate-700 rounded"></div>
<div class="w-10 h-2 bg-slate-700/50 rounded"></div>
</div>
<div class="h-24 bg-slate-800 rounded-xl border border-slate-700 flex flex-col p-3 items-start gap-2">
<div class="w-8 h-8 rounded-full bg-slate-700"></div>
<div class="w-16 h-2 bg-slate-700 rounded"></div>
<div class="w-10 h-2 bg-slate-700/50 rounded"></div>
</div>
</div>
</div>
</main>
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-16 pb-safe bg-slate-900/80 backdrop-blur-md border-t border-slate-800">

<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>

</a>

<span class="material-symbols-outlined" data-icon="group" style="font-variation-settings: 'FILL' 1;">group</span>
<span class="text-[11px] font-medium Inter">Team</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 active:opacity-70" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="text-[11px] font-medium Inter">Presenze</span>
</a>

<span class="material-symbols-outlined" data-icon="person">person</span>

</a>
